name: container-tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Container posture canary
        run: make test/posture
      - name: Debian and Ubuntu matrix
        run: make test/matrix
      - name: Root metadata lane
        run: make test/root-container
